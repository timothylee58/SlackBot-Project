name: Claude Code
  on:
    issue_comments:
      types: [created]
    pull_request_review_comments:
      types: [created]

  jobs:
    claude:
      runs-on: ubuntu-latest
      steps:
        - uses: anthropics/claude-code-action@main
          with:
            anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
