# fly.toml — Fly.io deployment config for SlackBot
# Deploy: fly launch --no-deploy, then set secrets, then fly deploy

app = "slackbot-project"
primary_region = "sin"  # Singapore — closest to LTA DataMall

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

# Set these with: fly secrets set KEY=value
# Required secrets:
#   SLACK_BOT_TOKEN
#   SLACK_CHANNEL_ID
#   LTA_ACCOUNT_KEY
#   BASE_URL   (set to https://<app-name>.fly.dev after first deploy)

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  # Puppeteer needs at least 512 MB; use 1 GB for headroom
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/"
    port = 3000
    timeout = "10s"
    type = "http"
