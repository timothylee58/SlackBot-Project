<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Update for MY, SG, HK</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
          integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">

    <style>
        #map { height: 100vh; width: 100vw; }
        body, html { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #controls { position: absolute; bottom: 9px; left: 10px; z-index: 1000; }
        #top-right-image { position: absolute; top: 5px; right: 12px; z-index: 1000; width: 150px; height: auto; }
    </style>
</head>

<body>

    <img id="top-right-image" src="/icon/oddle-logo.png" alt="Top Right Image">

    <div id="map"></div>

    <!-- Controls -->
    <div id="controls" class="btn-group-vertical">
        <button id="btn-singapore"    class="btn btn-primary mb-2">Singapore</button>
        <button id="btn-hong-kong"    class="btn btn-primary mb-2">Hong Kong</button>
        <button id="btn-klang-valley" class="btn btn-primary mb-2">Malaysia</button>
        <button id="btn-cloud"        class="btn btn-secondary mb-2">Show Clouds Layer</button>
        <button id="btn-precip"       class="btn btn-secondary mb-2">Show Precipitation Layer</button>
        <button id="btn-traffic"      class="btn btn-warning mb-2">Show Traffic Layer</button>
        <button class="btn btn-dark mb-2" data-toggle="modal" data-target="#settingsModal">⚙️ Slack Settings</button>
    </div>

    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1" role="dialog" aria-labelledby="settingsModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="settingsModalLabel">Slack Configuration</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="settings-alert" class="alert d-none" role="alert"></div>
                    <div class="form-group">
                        <label for="slackToken">Slack Bot Token</label>
                        <input type="password" class="form-control" id="slackToken"
                               placeholder="xoxb-..." autocomplete="off">
                        <small class="form-text text-muted">Starts with <code>xoxb-</code>. Leave blank to keep current value.</small>
                    </div>
                    <div class="form-group">
                        <label for="slackChannel">Slack Channel ID</label>
                        <input type="text" class="form-control" id="slackChannel"
                               placeholder="C0123456789" autocomplete="off">
                        <small class="form-text text-muted">The channel ID (not the name), e.g. <code>C0123456789</code>.</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button id="btn-save-settings" type="button" class="btn btn-primary">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (jQuery → Popper → Bootstrap) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
            integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"
            integrity="sha384-eMNCOe7tC1doHpGoWe/6oMVemdAVTMs2xqW4mwXrXsW0L84Iytr2wi5v2QjrP/xp" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"
            integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>

    <!-- App logic (no inline JS) -->
    <script src="/app.js"></script>

</body>

</html>
